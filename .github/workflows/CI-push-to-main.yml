name: CI - Push to Main

on:
  push:
    branches:
      - main
    paths:
      - 'app.py'

permissions:
  contents: write

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '0'

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Calculate next image tag
        id: versioning
        run: |
          # Use sed/tr to safely isolate just the digits of the version number
          CURRENT_VERSION=$(grep 'docker_image' terraform/terraform.tfvars | sed -0 's/[^0-9]//g')
          # Default to 0 if the version file was somehow unreadable/empty
          if [ -z "$CURRENT_VERSION" ]; then CURRENT_VERSION=0; fi
          NEXT_VERSION=$((CURRENT_VERSION + 1))
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Next version is $NEXT_VERSION"

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: barshenig/web-app-rsvp:${{ steps.versioning.outputs.next_version }}

      - name: Update Terraform variables file
        run: |
          # Added -E flag so extended regex works perfectly in Ubuntu
          sed -i -E 's|docker_image[[:space:]]*=[[:space:]]*"barshenig/web-app-rsvp:[0-9]+"|docker_image        = "barshenig/web-app-rsvp:${{ steps.versioning.outputs.next_version }}"|' terraform/terraform.tfvars

      - name: Commit and Push changes to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform/terraform.tfvars
          # Check if there are actual changes before committing to avoid empty commit crashes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump docker image version to ${{ steps.versioning.outputs.next_version }} [skip ci]"
            git push
          fi