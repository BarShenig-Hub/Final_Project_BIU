name: Terraform Infrastructure
on:
  workflow_dispatch:
    inputs:
      tf_action:
        description: 'Choose Action: bootstrap, apply, or destroy'
        required: true
        default: 'apply'
        type: choice
        options:
          - bootstrap
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform

    env:
      # Generating a unique and random bucket name based on the Repo ID (Deterministic)
      BUCKET_NAME: "tfstate-${{ github.repository_id }}-bucket-rsvp"
      TABLE_NAME: "tflock-${{ github.repository_id }}-table"
      AWS_REGION: "us-east-1"
      
      # ---------------------------------------------------------------------------------------------------------------------------------
      # CHANGE REQUIRED HERE: Replace 'YOUR_AWS_ACCOUNT_ID' with your real 12-digit AWS account number.
      # HOW TO FIND IT: Log into the AWS Console, click your username/avatar in the top-right corner, and copy the 12-digit "Account ID".
      # ---------------------------------------------------------------------------------------------------------------------------------
      OIDC_ROLE_ARN: "arn:aws:iam::059948105970:role/github-actions-terraform-role"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.OIDC_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Ensure Backend Infrastructure Exists (Bootstrap)
      if: ${{ github.event.inputs.tf_action == 'bootstrap' || github.event.inputs.tf_action == 'apply' }}
      run: |
        echo "Checking Backend Infrastructure..."
        
        # Check and create the S3 Bucket if it does not exist
        if ! aws s3api head-bucket --bucket "${{ env.BUCKET_NAME }}" 2>/dev/null; then
          echo "Creating S3 bucket: ${{ env.BUCKET_NAME }}"
          aws s3api create-bucket --bucket "${{ env.BUCKET_NAME }}" --region ${{ env.AWS_REGION }}
          aws s3api put-bucket-versioning --bucket "${{ env.BUCKET_NAME }}" --versioning-configuration Status=Enabled
        else
          echo "S3 bucket already exists."
        fi

        # Check and create the DynamoDB table if it does not exist
        if ! aws dynamodb describe-table --table-name "${{ env.TABLE_NAME }}" 2>/dev/null; then
          echo "Creating DynamoDB table: ${{ env.TABLE_NAME }}"
          aws dynamodb create-table \
            --table-name "${{ env.TABLE_NAME }}" \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region ${{ env.AWS_REGION }}
          
          echo "Waiting for table to be active..."
          aws dynamodb wait table-exists --table-name "${{ env.TABLE_NAME }}"
        else
          echo "DynamoDB table already exists."
        fi
        
        # Check and create the Secrets Manager secret if it does not exist
        if ! aws secretsmanager describe-secret --secret-id rsvp/admin_credentials 2>/dev/null; then
          echo "Creating Secrets Manager secret: rsvp/admin_credentials"
          aws secretsmanager create-secret \
            --name rsvp/admin_credentials \
            --description "Empty secret for RSVP admin credentials to be populated manually later" \
            --region ${{ env.AWS_REGION }}
        else
          echo "Secrets Manager secret already exists."
        fi

    - name: Terraform Init (Dynamic Injection)
      # Runs on all actions to connect the deterministic Backend
      run: |
        terraform init \
          -backend-config="bucket=${{ env.BUCKET_NAME }}" \
          -backend-config="dynamodb_table=${{ env.TABLE_NAME }}"

    - name: Terraform Validate
      # Runs on all actions to ensure code syntax is correct before proceeding
      run: terraform validate

    - name: Terraform Plan
      if: ${{ github.event.inputs.tf_action == 'apply' }}
      # Calculates the changes after the state is fully synced
      run: terraform plan -out=tfplan

    - name: Terraform Apply
      if: ${{ github.event.inputs.tf_action == 'apply' }}
      run: terraform apply -auto-approve

    - name: Terraform Destroy (Two-Stage Full Clean)
      if: ${{ github.event.inputs.tf_action == 'destroy' }}
      run: |
        terraform destroy -auto-approve
